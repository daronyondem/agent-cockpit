<div id="root" data-direction="editorial" data-theme="light" data-density="default" data-radius="moderate"></div>

<script>
  /* Pre-paint theme application — reads `ac:v2:theme` from localStorage and
     swaps the root `data-theme` + hljs stylesheet before React boots, so
     dark-theme users don't see a flash of the light default. Server is the
     source of truth; localStorage is written on save/load in settingsScreen.jsx. */
  (function(){
    try {
      var saved = localStorage.getItem('ac:v2:theme') || 'system';
      var resolved = saved;
      if (saved === 'system') {
        resolved = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
      }
      var root = document.getElementById('root');
      if (root) root.setAttribute('data-theme', resolved);
      var hljsLink = document.getElementById('hljs-theme');
      if (hljsLink) {
        var style = resolved === 'dark' ? 'github-dark' : 'github';
        hljsLink.href = 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/' + style + '.min.css';
      }
    } catch (e) {}
  })();

  /* Pre-paint sidebar-width application — reads `ac:v2:sb-width` from
     localStorage and sets `--cockpit-sb-w` on the root element before the
     cockpit grid paints, avoiding a width-flicker from the 260px default. */
  (function(){
    try {
      var w = Number(localStorage.getItem('ac:v2:sb-width'));
      if (Number.isFinite(w) && w >= 200 && w <= 600) {
        document.documentElement.style.setProperty('--cockpit-sb-w', w + 'px');
      }
    } catch (e) {}
  })();
</script>
