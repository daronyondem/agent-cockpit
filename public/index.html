<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Agent Cockpit</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link id="hljs-theme" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
<link rel="stylesheet" href="styles.css?v=4">
</head>
<body class="chat-active">

<!-- ── Chat Layout ────────────────────────────────────────────────────────────── -->
<div class="chat-layout">
  <div class="chat-sidebar" id="chat-sidebar">
    <div class="chat-sidebar-header">
      <button class="chat-sidebar-toggle" id="chat-sidebar-collapse" title="Collapse sidebar">☰</button>
      <button class="chat-new-btn" id="chat-new-btn"><svg class="kb-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><path d="M8 9h8"/><path d="M8 13h6"/></svg> New Chat</button>
    </div>
    <div class="chat-search">
      <input type="text" id="chat-search-input" placeholder="Search conversations..." />
    </div>
    <div class="chat-conv-list" id="chat-conv-list">
      <!-- populated by JS -->
    </div>
    <div class="chat-sidebar-footer" id="chat-settings-btn">
      <svg class="kb-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33 1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82 1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/></svg> Settings
    </div>
    <div class="chat-sidebar-footer" id="chat-signout-btn">
      <svg class="kb-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Sign Out
    </div>
    <div class="chat-sidebar-version" id="chat-version-label">
      <span id="chat-version-text"></span>
      <span id="chat-update-indicator" class="chat-update-indicator" style="display:none;" title="Update available">Update available</span>
    </div>
  </div>
  <div class="chat-main">
    <div class="chat-header">
      <button class="chat-header-toggle" id="chat-header-toggle" title="Show sidebar">☰</button>
      <div class="chat-header-title" id="chat-header-title">New Chat</div>
      <div class="chat-header-actions">
        <button class="chat-header-btn" id="chat-download-btn" title="Download conversation (Ctrl+Shift+D)"><svg class="kb-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download</button>
        <button class="chat-header-btn" id="chat-reset-btn" title="Reset session (Ctrl+Shift+R)"><svg class="kb-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg> Reset</button>
        <button class="chat-header-btn" id="chat-sessions-btn" title="Session history"><svg class="kb-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg> Sessions</button>
      </div>
    </div>
    <div class="chat-messages" id="chat-messages">
      <div class="chat-empty-state" id="chat-empty-state">
        <div class="chat-empty-title">What can I help with?</div>
        <div class="chat-empty-subtitle">Start a conversation with Agent Cockpit</div>
        <div class="chat-prompt-cards">
          <div class="chat-prompt-card" data-prompt="Summarize today's action plan and priorities">Summarize today's action plan and priorities</div>
          <div class="chat-prompt-card" data-prompt="What are my active tasks and their status?">What are my active tasks and their status?</div>
          <div class="chat-prompt-card" data-prompt="Review my LinkedIn content strategy">Review my LinkedIn content strategy</div>
        </div>
      </div>
    </div>
    <!--
      KB Browser view — swaps with `chat-messages` when the user clicks the
      KB button on a workspace group header. Populated by chatOpenKbBrowser
      in main.js. Kept as a sibling of chat-messages so the main-area
      chrome (header + input) can be hidden or repurposed consistently.
    -->
    <div class="chat-kb-browser" id="chat-kb-browser" style="display:none;"></div>
    <div class="chat-input-area">
      <div class="chat-input-wrapper">
        <div id="chat-dream-banner" class="chat-dream-banner" style="display:none;"></div>
        <div class="chat-model-select-row">
          <select class="chat-model-select" id="chat-backend-select">
            <!-- Populated dynamically from /api/chat/backends -->
          </select>
          <select class="chat-model-select" id="chat-model-select" style="display:none;">
            <!-- Populated dynamically based on selected backend's models -->
          </select>
          <select class="chat-model-select" id="chat-effort-select" style="display:none;" title="Adaptive reasoning effort">
            <!-- Populated dynamically based on the selected model's supportedEffortLevels -->
          </select>
        </div>
        <div id="chat-file-chips" class="chat-file-chips" style="display:none;"></div>
        <div class="chat-input-box">
          <textarea id="chat-textarea" placeholder="Message Agent Cockpit..." rows="1"></textarea>
          <div class="chat-input-btns">
            <button class="chat-attach-btn" id="chat-attach-btn" title="Attach files"><svg class="kb-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg></button>
            <input type="file" id="chat-file-input" multiple style="display:none;">
            <button class="chat-send-btn" id="chat-send-btn" disabled title="Send message (Enter)"><svg class="kb-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg></button>
          </div>
        </div>
        <div class="chat-input-hint">Enter to send, Shift+Enter for newline</div>
      </div>
    </div>
  </div>
  <!-- File viewer panel — slides in from the right when the user clicks
       "View" on a file delivery card. Closed via the X button or when
       switching conversations. -->
  <div class="chat-file-viewer" id="chat-file-viewer">
    <div class="chat-file-viewer-header">
      <span class="chat-file-viewer-title" id="chat-file-viewer-title"></span>
      <button class="chat-file-viewer-close" onclick="chatCloseFileViewer()" title="Close">&times;</button>
    </div>
    <div class="chat-file-viewer-content" id="chat-file-viewer-content"></div>
  </div>
</div>

<!-- Lightbox overlay for full-size images -->
<div class="chat-lightbox" id="chat-lightbox">
  <img class="chat-lightbox-img" id="chat-lightbox-img" src="" alt="">
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<script type="importmap">{"imports":{"three":"https://esm.sh/three@0.183.2"}}</script>
<script type="module" src="js/main.js"></script>
</body>
</html>
